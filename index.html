<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxo TOTVS & Acessos – Tecnicall</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0c29; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const palette = {
      novo:         { bg: "#e8f5e9", accent: "#2e7d32", light: "#c8e6c9" },
      atualizacao:  { bg: "#e3f2fd", accent: "#1565c0", light: "#bbdefb" },
      email:        { bg: "#f3e5f5", accent: "#6a1b9a", light: "#e1bee7" },
      desligamento: { bg: "#fce4ec", accent: "#b71c1c", light: "#ffcdd2" },
      regras:       { bg: "#fff8e1", accent: "#e65100", light: "#ffecb3" },
    };

    const sections = [
      {
        key: "novo", label: "Novo Usuário", emoji: "👤", color: "#43a047",
        id: "01 · Criação", title: "Criação de Novo Usuário (TOTVS)", colorKey: "novo",
        responsavel: "Engenheiro residente",
        envio: "tip@tecnicallengenharia.com.br",
        copias: ["rh@tecnicallengenharia.com.br", "dp@tecnicallengenharia.com.br", "Gerente responsável"],
        aprovacoes: ["Ciente do RH", "Ciente do gerente responsável"],
        dados: ["Nome completo", "Cargo / Função", "Código(s) do(s) Centro(s) de Custo"],
        observacoes: [
          "A criação só será realizada após os cientes obrigatórios.",
          "Caso o cargo/função não seja suficiente para identificar o perfil de acesso, indicar um colaborador de referência já cadastrado no TOTVS com perfil equivalente ao desejado. Caso não exista colaborador de referência, descrever detalhadamente no corpo do e-mail os módulos e permissões necessários, alinhando previamente com o TIP se necessário.",
        ],
      },
      {
        key: "atualizacao", label: "Atualização", emoji: "🔄", color: "#1976d2",
        id: "02 · Atualização", title: "Atualização de Acessos (TOTVS)", colorKey: "atualizacao",
        responsavel: "Engenheiro residente",
        envio: "tip@tecnicallengenharia.com.br",
        copias: ["rh@tecnicallengenharia.com.br", "dp@tecnicallengenharia.com.br", "Gerente responsável"],
        aprovacoes: ["Gerente responsável", "RH — somente para aprendiz ou administrativo"],
        dados: ["Nome completo", "Cargo / Função", "Código(s) do(s) Centro(s) de Custo"],
        observacoes: [
          "Detalhar claramente os acessos a serem alterados.",
          "Em caso de troca de centro de custo, indicar se há necessidade de revogação dos acessos anteriores.",
          "Em caso de mudança de cargo/função, indicar um colaborador de referência já cadastrado no TOTVS com perfil equivalente ao desejado. Caso não exista colaborador de referência, descrever detalhadamente no corpo do e-mail os módulos e permissões necessários, alinhando previamente com o TIP se necessário.",
        ],
      },
      {
        key: "email", label: "E-mail / Teams", emoji: "💻", color: "#8e24aa",
        id: "03 · E-mail / Teams", title: "Criação de E-mail ou Acesso ao Teams", colorKey: "email",
        responsavel: "Gerente responsável",
        envio: "licencas@tecnicallengenharia.com.br",
        copias: ["rh@tecnicallengenharia.com.br"],
        aprovacoes: ["Solicitação do gerente já é suficiente — nenhum ciente adicional necessário."],
        dados: ["Nome completo", "Cargo / Função", "Código(s) do(s) Centro(s) de Custo"],
        observacoes: ["Informar se a licença é BASIC (E-mail/Teams)", "Informar se a licença é ESSENTIALS (Exclusivamente Teams.", "Todas as licenças operam em uma fila de espera única para toda a empresa. Não há possibilidade de reservar ou destinar uma licença para um setor específico. Caso não haja disponibilidade, será obrigatória a aquisição de uma nova licença."],
      },
      {
        key: "desligamento", label: "Desligamento", emoji: "❌", color: "#e53935",
        id: "04 · Desligamento", title: "Desligamento ou Revogação Temporária de Acesso", colorKey: "desligamento",
        responsavel: "Gerente ou responsável pelo setor",
        envio: "tip@tecnicallengenharia.com.br",
        copias: ["rh@tecnicallengenharia.com.br", "dp@tecnicallengenharia.com.br"],
        aprovacoes: ["Solicitação do responsável pelo setor já é suficiente — nenhum ciente adicional necessário."],
        dados: ["Nome completo", "Cargo / Função", "Código(s) do(s) Centro(s) de Custo", "Tipo: Desligamento ou Revogação temporária"],
        observacoes: [
          "Incluir data de desligamento ou período da revogação temporária.",
          "Detalhar quais acessos devem ser removidos ou suspensos.",
        ],
      },
      {
        key: "regras", label: "Boas Práticas", emoji: "⚠️", color: "#fb8c00",
        id: "Boas Práticas", title: "Boas Práticas", colorKey: "regras",
      },
    ];

    const Tag = ({ children, color }) => (
      <span style={{
        display: "inline-block", background: color + "22", color,
        border: `1px solid ${color}44`, borderRadius: 6, padding: "2px 10px",
        fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, letterSpacing: 0.3,
      }}>{children}</span>
    );

    const EmailBadge = ({ email, accent }) => (
      <span style={{
        display: "inline-flex", alignItems: "center", gap: 5,
        background: "#1a1a2e", color: "#e0e0e0", borderRadius: 8, padding: "4px 12px",
        fontSize: 12.5, fontFamily: "'IBM Plex Mono', monospace", border: `1px solid ${accent}55`, letterSpacing: 0.2,
      }}>
        <span style={{ color: accent, fontSize: 14 }}>✉</span>{email}
      </span>
    );

    const CheckItem = ({ children, accent }) => (
      <li style={{ display: "flex", alignItems: "flex-start", gap: 8, fontSize: 14, color: "#333", lineHeight: 1.5, marginBottom: 4, listStyle: "none" }}>
        <span style={{ marginTop: 1, flexShrink: 0, width: 20, height: 20, background: accent, color: "#fff", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700 }}>✓</span>
        {children}
      </li>
    );

    const BulletItem = ({ children, accent }) => (
      <li style={{ display: "flex", alignItems: "flex-start", gap: 8, fontSize: 13.5, color: "#444", lineHeight: 1.55, marginBottom: 5, listStyle: "none" }}>
        <span style={{ color: accent, fontWeight: 900, fontSize: 16, marginTop: -1 }}>›</span>{children}
      </li>
    );

    const Label = ({ text, accent }) => (
      <div style={{ fontSize: 11.5, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: 0.8 }}>{text}</div>
    );

    const SectionContent = ({ s }) => {
      const p = palette[s.colorKey];
      if (s.key === "regras") {
        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <Label text="📌 Toda solicitação deve conter" accent={p.accent} />
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
                {["Nome completo", "Cargo / Função", "Código(s) do(s) Centro(s) de Custo", "Tipo de solicitação", "Descrição dos acessos"].map((d, i) =>
                  <Tag key={i} color={p.accent}>{d}</Tag>
                )}
              </div>
            </div>
            <div style={{ background: p.bg, borderRadius: 10, padding: "14px 16px", border: `1px dashed ${p.light}` }}>
              <Label text="🔁 Troca de Centro de Custo / Alteração de Acesso" accent={p.accent} />
              <p style={{ margin: "8px 0 0", fontSize: 14, color: "#444", lineHeight: 1.6 }}>
                Em caso de troca de centro de custo ou alteração de acesso, indicar <strong>claramente</strong> se há necessidade de revogação dos acessos anteriores.
              </p>
            </div>
          </div>
        );
      }
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <div>
            <Label text="👤 Responsável pela Solicitação" accent={p.accent} />
            <p style={{ margin: "6px 0 0", fontSize: 14, color: "#333" }}>{s.responsavel}</p>
          </div>
          <div>
            <Label text="📧 Envio para" accent={p.accent} />
            <div style={{ marginTop: 6 }}><EmailBadge email={s.envio} accent={p.accent} /></div>
          </div>
          <div>
            <Label text="📋 Cópia Obrigatória" accent={p.accent} />
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6 }}>
              {s.copias.map((c, i) => <EmailBadge key={i} email={c} accent={p.accent} />)}
            </div>
          </div>
          <div>
            <Label text="✅ Aprovação Necessária" accent={p.accent} />
            <ul style={{ margin: "8px 0 0", padding: 0 }}>
              {s.aprovacoes.map((a, i) => <CheckItem key={i} accent={p.accent}>{a}</CheckItem>)}
            </ul>
          </div>
          <div style={{ background: p.bg, borderRadius: 10, padding: "14px 16px", border: `1px solid ${p.light}` }}>
            <Label text="📝 Dados Obrigatórios do Colaborador" accent={p.accent} />
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
              {s.dados.map((d, i) => <Tag key={i} color={p.accent}>{d}</Tag>)}
            </div>
          </div>
          {s.observacoes && (
            <div style={{ background: "#fafafa", borderRadius: 10, padding: "14px 16px", border: `1px dashed ${p.light}` }}>
              <Label text="💡 Observações" accent={p.accent} />
              <ul style={{ margin: "8px 0 0", padding: 0 }}>
                {s.observacoes.map((o, i) => <BulletItem key={i} accent={p.accent}>{o}</BulletItem>)}
              </ul>
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [active, setActive] = useState("novo");
      const current = sections.find(s => s.key === active);
      const p = palette[current.colorKey];
      const activeColor = sections.find(s => s.key === active).color;

      return (
        <div style={{
          minHeight: "100vh",
          background: "linear-gradient(160deg, #0f0c29 0%, #1a1a4e 50%, #24243e 100%)",
          padding: "40px 16px 60px",
          fontFamily: "'DM Sans', sans-serif",
        }}>
          {/* Header */}
          <div style={{ maxWidth: 780, margin: "0 auto 24px", textAlign: "center" }}>
            <div style={{
              display: "inline-block",
              background: "linear-gradient(90deg, #6ee7f7, #a78bfa)",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
              fontSize: 13, fontFamily: "'IBM Plex Mono', monospace",
              fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", marginBottom: 10,
            }}>TECNICALL ENGENHARIA · TIP</div>
            <h1 style={{
              fontFamily: "'Syne', sans-serif", fontWeight: 800,
              fontSize: "clamp(28px, 5vw, 42px)", color: "#fff", margin: "0 0 12px", lineHeight: 1.15,
            }}>
              Fluxo de Solicitação<br />
              <span style={{ background: "linear-gradient(90deg, #6ee7f7, #a78bfa)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                TOTVS & Acessos
              </span>
            </h1>
            <p style={{ color: "#94a3b8", fontSize: 15, margin: 0 }}>
              Guia de processos para criação, atualização e revogação de acessos
            </p>
          </div>

          {/* SLA Banner */}
          <div style={{
            maxWidth: 780, margin: "0 auto 24px",
            background: "linear-gradient(135deg, #1a1a3e 0%, #12122a 100%)",
            border: "1.5px solid #facc1588", borderRadius: 16,
            padding: "20px 28px", display: "flex", alignItems: "center", gap: 20,
            boxShadow: "0 0 32px #facc1522",
          }}>
            <div style={{
              flexShrink: 0, width: 64, height: 64, borderRadius: 14,
              background: "linear-gradient(135deg, #f59e0b, #fbbf24)",
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              boxShadow: "0 4px 16px #f59e0b66",
            }}>
              <span style={{ fontSize: 26, lineHeight: 1 }}>⏱</span>
              <span style={{ fontSize: 11, fontWeight: 800, color: "#1a1a00", fontFamily: "'IBM Plex Mono', monospace" }}>SLA</span>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 700, color: "#fbbf24", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 4 }}>Prazo de Execução</div>
              <div style={{ fontSize: 22, fontFamily: "'Syne', sans-serif", fontWeight: 800, color: "#fff", lineHeight: 1.15, marginBottom: 6 }}>
                Até <span style={{ color: "#fbbf24" }}>02 dias úteis</span> para execução
              </div>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 8, background: "#ffffff0a", borderRadius: 8, padding: "8px 12px", border: "1px solid #facc1533" }}>
                <span style={{ color: "#fbbf24", fontSize: 15, marginTop: 1, flexShrink: 0 }}>⚠</span>
                <span style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.55 }}>
                  O prazo <strong style={{ color: "#fbbf24" }}>só começa a contar</strong> após a confirmação de ciência de <strong style={{ color: "#fff" }}>todos os responsáveis</strong> pela solicitação.
                </span>
              </div>
            </div>
          </div>

          {/* Tab Nav */}
          <div style={{ maxWidth: 780, margin: "0 auto 20px" }}>
            <div style={{
              borderRadius: 20, padding: 16,
              background: "linear-gradient(135deg, #0d0d2b 0%, #111128 50%, #0a0a1f 100%)",
              border: "1px solid #ffffff0f",
              boxShadow: "0 8px 40px #00000055, inset 0 1px 0 #ffffff08",
              position: "relative", overflow: "hidden",
            }}>
              {/* Background orbs */}
              <div style={{
                position: "absolute", top: -40, left: -40,
                width: 180, height: 180, borderRadius: "50%",
                background: `radial-gradient(circle, ${activeColor}18 0%, transparent 70%)`,
                pointerEvents: "none", transition: "background 0.4s",
              }} />
              <div style={{
                position: "absolute", bottom: -40, right: -40,
                width: 150, height: 150, borderRadius: "50%",
                background: `radial-gradient(circle, ${activeColor}10 0%, transparent 70%)`,
                pointerEvents: "none", transition: "background 0.4s",
              }} />

              {/* Label */}
              <div style={{
                fontSize: 10, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 700,
                color: "#ffffff33", textTransform: "uppercase", letterSpacing: 2,
                marginBottom: 12, textAlign: "center",
              }}>Selecione o fluxo desejado</div>

              {/* Tabs */}
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                {sections.map(s => {
                  const isActive = active === s.key;
                  return (
                    <button
                      key={s.key}
                      onClick={() => setActive(s.key)}
                      style={{
                        flex: 1, minWidth: 110,
                        display: "flex", flexDirection: "column",
                        alignItems: "center", justifyContent: "center", gap: 8,
                        padding: "16px 10px", borderRadius: 14, cursor: "pointer",
                        fontFamily: "'IBM Plex Mono', monospace",
                        transition: "all 0.25s ease",
                        background: isActive ? `linear-gradient(145deg, ${s.color}22, ${s.color}0a)` : "#ffffff05",
                        color: isActive ? "#fff" : "#ffffff44",
                        border: isActive ? `1.5px solid ${s.color}cc` : "1.5px solid #ffffff0a",
                        boxShadow: isActive
                          ? `0 0 16px ${s.color}66, 0 0 40px ${s.color}22, inset 0 1px 0 ${s.color}33`
                          : "inset 0 1px 0 #ffffff05",
                        outline: "none", position: "relative", overflow: "hidden",
                      }}
                    >
                      {isActive && (
                        <div style={{
                          position: "absolute", top: 0, left: "15%", right: "15%", height: 2,
                          background: `linear-gradient(90deg, transparent, ${s.color}, transparent)`,
                          borderRadius: 2,
                        }} />
                      )}
                      <span style={{
                        fontSize: isActive ? 28 : 22, lineHeight: 1,
                        transition: "font-size 0.25s, filter 0.25s",
                        filter: isActive ? `drop-shadow(0 0 8px ${s.color}99)` : "none",
                      }}>{s.emoji}</span>
                      <span style={{
                        fontSize: 11, fontWeight: 700, letterSpacing: 0.5,
                        color: isActive ? "#fff" : "#ffffff44",
                        textAlign: "center", lineHeight: 1.3,
                      }}>{s.label}</span>
                      {isActive && (
                        <div style={{
                          width: 20, height: 3, borderRadius: 2,
                          background: `linear-gradient(90deg, ${s.color}, ${s.color}88)`,
                          boxShadow: `0 0 8px ${s.color}`,
                        }} />
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Active Card */}
          <div style={{ maxWidth: 780, margin: "0 auto" }}>
            <div style={{
              background: "#fff", borderRadius: 16, overflow: "hidden",
              boxShadow: `0 4px 24px ${p.accent}22`,
              border: `1.5px solid ${p.light}`,
            }}>
              <div style={{
                display: "flex", alignItems: "center", gap: 14, padding: "20px 24px",
                background: `linear-gradient(135deg, ${p.bg} 0%, #fff 100%)`,
                borderBottom: `1.5px solid ${p.light}`,
              }}>
                <span style={{
                  fontSize: 26, background: p.accent, width: 52, height: 52,
                  borderRadius: 13, flexShrink: 0,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  boxShadow: `0 4px 14px ${p.accent}55`,
                }}>{current.emoji}</span>
                <div>
                  <div style={{ fontSize: 11, color: p.accent, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 2 }}>{current.id}</div>
                  <div style={{ fontSize: 20, fontFamily: "'Syne', sans-serif", fontWeight: 800, color: "#1a1a2e" }}>{current.title}</div>
                </div>
              </div>
              <div style={{ padding: "24px" }}>
                <SectionContent s={current} />
              </div>
            </div>

            {/* Footer */}
            <div style={{
              textAlign: "center", color: "#64748b", fontSize: 12,
              fontFamily: "'IBM Plex Mono', monospace",
              marginTop: 24, padding: "12px 0",
              borderTop: "1px solid #ffffff18",
            }}>
              TECNICALL ENGENHARIA · Fluxo TIP · Dúvidas: tip@tecnicallengenharia.com.br
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
